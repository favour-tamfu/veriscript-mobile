project_id = "veriscript-mobile"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "io.supabase.flutter://signin-callback/"
additional_redirect_urls = ["veriscript://signin-callback", "io.supabase.flutter://login-callback/"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

# Webhooks are called by external services (CloudConvert / Copyleaks) without a
# Supabase JWT, so JWT verification must be off or they'd return 401. The
# cloudconvert-webhook verifies CloudConvert's HMAC signature instead.
[functions.cloudconvert-webhook]
verify_jwt = false

[functions.copyleaks-webhook]
verify_jwt = false

[analytics]
enabled = false
