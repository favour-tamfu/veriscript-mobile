name: veriscipt_mobile
description: Document integrity and utility suite for students and professionals
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Data models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.4.3

  # Security
  flutter_secure_storage: ^9.2.2

  # File & Camera
  file_picker: ^8.0.6
  camera: ^0.10.5+9
  google_mlkit_text_recognition: ^0.13.0

  # Google Sign-In (for Drive integration)
  google_sign_in: ^6.2.1

  # Local DB
  drift: ^2.19.1
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.4
  path: ^1.9.0

  # Preferences
  shared_preferences: ^2.3.0

  # UI
  fl_chart: ^0.68.0
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  share_plus: ^12.0.2
  url_launcher: ^6.3.0
  flutter_local_notifications: ^17.2.3
  connectivity_plus: ^6.0.3
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3

  # Monitoring
  sentry_flutter: ^7.18.0

  # i18n
  intl: ^0.20.2

  # Phase 2 additions
  http: ^1.2.0
  image_picker: ^1.1.0
  image_cropper: ^12.2.1
  flutter_markdown: ^0.7.3
  pdf: ^3.10.8
  printing: ^5.13.1
  open_file: ^3.3.2
  workmanager: ^0.9.0
  crypto: ^3.0.3
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.5.4
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  drift_dev: ^2.19.1
  mockito: ^5.4.4
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# App launcher icon generation:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "icon/logo.png"
  adaptive_icon_background: "#0F1E2D"
  adaptive_icon_foreground: "icon/logo_foreground.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/fonts/
